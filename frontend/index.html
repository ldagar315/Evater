    <meta property="og:site_name" content="Evater" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Evater | Tests made fun. Progress made visible." />
    <meta name="twitter:description" content="Evater helps students in Classes 6–10 take tests, understand feedback, and practise again without leaving the learning loop." />
    <meta name="twitter:image" content="https://evater.com/Evater_logo_2.png" />
    <title>Evater | Tests made fun. Progress made visible.</title>
    <style>
      /* Prevent flash of unstyled content */
      body {
        background-color: #fbfaf3;
        margin: 0;
        font-family: 'Open Sans', system-ui, sans-serif;
      }
      
      /* Loading screen for initial load */
      #initial-loading {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #fbfaf3;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      
      .loading-spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #e5e5e5;
        border-top: 4px solid #37c2a3;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      /* Hide loading screen once React loads */
      .loaded #initial-loading {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="initial-loading">
      <div class="loading-spinner"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Remove initial loading screen once React takes over
      window.addEventListener('load', function() {
        setTimeout(function() {
          document.body.classList.add('loaded');
        }, 100);
      });
      
      // Error handling for missing environment variables
      window.addEventListener('error', function(e) {
        console.error('Global error:', e.error);
        if (e.error && e.error.message && e.error.message.includes('Supabase')) {
          console.error('Supabase configuration error detected');
        }
      });
    </script>
  </body>
</html>
